version: "3.8"

services:
  db:
    image: postgres:15
    container_name: lpg_db
    environment:
      POSTGRES_DB: lpgdb
      POSTGRES_USER: lpguser
      POSTGRES_PASSWORD: lpgpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: