version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: lpg-service-postgres
    restart: always
    environment:
      POSTGRES_USER: lpg
      POSTGRES_PASSWORD: lpg
      POSTGRES_DB: lpg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: lpg-service-backend
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  bot:
    build: ./bot
    container_name: lpg-service-bot
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    command: python main.py

volumes:
  pgdata: