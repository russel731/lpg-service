<!DOCTYPE html>
<html>
<head>
    <title>LPG Map</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map {
            height: 100vh;
        }
    </style>
</head>

<body>
<div id="map"></div>

<script>

const map = L.map('map').setView([55.75, 37.61], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);


// 🎨 Цвет по статусу
function getColor(status) {
    if (status === "available") return "#2ecc71"; // зелёный
    if (status === "low") return "#f1c40f";       // жёлтый
    if (status === "empty") return "#e74c3c";     // красный
    return "#3498db";                             // синий неизвестно
}


// 🚀 SVG пин с колонкой
function createIcon(status) {

    const color = getColor(status);

    const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="50" viewBox="0 0 40 50">
        <path d="M20 0C10 0 2 8 2 18c0 14 18 32 18 32s18-18 18-32C38 8 30 0 20 0z"
              fill="${color}"/>
        <circle cx="20" cy="18" r="10" fill="white"/>
        <path d="M16 12 h6 v12 h-6 z" fill="black"/>
        <rect x="22" y="14" width="2" height="6" fill="black"/>
        <path d="M24 20 q4 2 0 4" stroke="black" fill="none" stroke-width="1"/>
    </svg>
    `;

    return L.divIcon({
        html: svg,
        className: "",
        iconSize: [40, 50],
        iconAnchor: [20, 50]
    });
}


// 📡 Загрузка станций
async function loadStations() {

    const response = await fetch("/stations/");
    const stations = await response.json();

    stations.forEach(st => {

        const icon = createIcon(st.status);

        L.marker([st.lat, st.lon], { icon: icon })
            .addTo(map)
            .bindPopup(
                `<b>${st.name}</b><br>Status: ${st.status}`
            );
    });
}

loadStations();

</script>
</body>
</html>
