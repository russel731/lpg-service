version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: lpg
      POSTGRES_PASSWORD: lpg
      POSTGRES_DB: lpg
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres

  bot:
    build: ./bot
    restart: always
    env_file:
      - .env
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - bot

volumes:
  postgres_data: