services:
  postgres:
    image: postgres:15
    container_name: lpg-service-postgres
    environment:
      POSTGRES_DB: lpg
      POSTGRES_USER: lpg
      POSTGRES_PASSWORD: lpg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: lpg-service-backend
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  bot:
    build: ./bot
    container_name: lpg-service-bot
    env_file: .env
    depends_on:
      - backend

volumes:
  pgdata:
